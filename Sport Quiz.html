      { q: "What is the name of the sport that combines jumping and running?", opts: ["Decathlon", "Heptathlon", "Pentathlon", "All of the above"], ans: 0, sport: "general", difficulty: "hard" },

      { q: "What is the name of the sport that combines throwing and jumping?", opts: ["Decathlon", "Heptathlon", "Pentathlon", "All of the above"], ans: 0, sport: "general", difficulty: "hard" },

    ];
    generalPool.forEach(item => QUESTION_BANK.push(item));

    // ----- DOM refs (same as before) -----
    const questionText = document.getElementById('questionText');
    const optionsBtns = document.querySelectorAll('.option-btn');
    const feedback = document.getElementById('feedbackMessage');
    const scoreDisplay = document.getElementById('scoreDisplay');
    const qIndexDisplay = document.getElementById('qIndexDisplay');
    const totalQDisplay = document.getElementById('totalQDisplay');
    const nextBtn = document.getElementById('nextBtn');
    const resetBtn = document.getElementById('resetBtn');
    const sportFilter = document.getElementById('sportFilter');
    const difficultyFilter = document.getElementById('difficultyFilter');

    // ----- State -----
    let currentQuestions = [];
    let currentIndex = 0;
    let score = 0;
    let answered = false;
    const TOTAL_ROUNDS = 10;

    // ----- Helpers (shuffle, filter) -----
    function shuffleArray(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function getFilteredQuestions() {
      const sport = sportFilter.value;
      const difficulty = difficultyFilter.value;
      let filtered = QUESTION_BANK.filter(item => {
        if (sport !== 'all' && item.sport !== sport) return false;
        if (difficulty !== 'all' && item.difficulty !== difficulty) return false;
        return true;
      });
      // Fallback: if empty, use all questions
      if (filtered.length === 0) {
        filtered = [...QUESTION_BANK];
      }
      const shuffled = shuffleArray(filtered);
      // Ensure we have at least TOTAL_ROUNDS (duplicate if necessary)
      let result = [];
      while (result.length < TOTAL_ROUNDS) {
        for (let item of shuffled) {
          if (result.length >= TOTAL_ROUNDS) break;
          result.push({ ...item });
        }
      }
      return result;
    }

    function resetGame() {
      currentQuestions = getFilteredQuestions();
      currentIndex = 0;
      score = 0;
      answered = false;
      updateScoreAndIndex();
      renderQuestion(currentIndex);
      optionsBtns.forEach(btn => {
        btn.disabled = false;
        btn.classList.remove('correct', 'wrong');
      });
      feedback.innerHTML = '🤔 Pick an answer!';
      nextBtn.disabled = false;
      nextBtn.textContent = '▶ Next';
    }

    function updateScoreAndIndex() {
      scoreDisplay.textContent = score;
      qIndexDisplay.textContent = currentIndex + 1;
      totalQDisplay.textContent = TOTAL_ROUNDS;
    }

    function renderQuestion(index) {
      const qData = currentQuestions[index];
      if (!qData) return;
      questionText.textContent = qData.q;
      qData.opts.forEach((opt, i) => {
        if (optionsBtns[i]) {
          optionsBtns[i].textContent = opt;
          optionsBtns[i].dataset.correct = (i === qData.ans) ? 'true' : 'false';
          optionsBtns[i].classList.remove('correct', 'wrong');
          optionsBtns[i].disabled = false;
        }
      });
      answered = false;
      if (index === TOTAL_ROUNDS - 1) {
        nextBtn.textContent = '🏁 Finish';
      } else {
        nextBtn.textContent = '▶ Next';
      }
      optionsBtns.forEach(btn => btn.disabled = false);
    }

    // ----- Event handlers (same as before) -----
    function handleOptionClick(e) {
      const btn = e.currentTarget;
      if (answered || btn.disabled) return;
      const isCorrect = btn.dataset.correct === 'true';
      answered = true;
      optionsBtns.forEach(b => b.disabled = true);

      optionsBtns.forEach(b => {
        if (b.dataset.correct === 'true') b.classList.add('correct');
        else if (b === btn && !isCorrect) b.classList.add('wrong');
      });

      if (isCorrect) {
        score += 1;
        feedback.innerHTML = '✅ Correct! +1 point 🎉';
      } else {
        const correctAns = currentQuestions[currentIndex].opts[currentQuestions[currentIndex].ans];
        feedback.innerHTML = `❌ Oops, the answer was “${correctAns}”`;
      }
      scoreDisplay.textContent = score;
    }

    function handleNext() {
      if (!answered) {
        feedback.innerHTML = '⚠️ Please answer the current question first!';
        return;
      }
      if (currentIndex === TOTAL_ROUNDS - 1) {
        feedback.innerHTML = `🏁 Game over! Your score: ${score} / ${TOTAL_ROUNDS} 🎯`;
        nextBtn.disabled = true;
        optionsBtns.forEach(b => b.disabled = true);
        return;
      }
      currentIndex++;
      updateScoreAndIndex();
      renderQuestion(currentIndex);
      answered = false;
      feedback.innerHTML = '🤔 Pick an answer!';
      nextBtn.disabled = false;
      optionsBtns.forEach(b => b.classList.remove('correct', 'wrong'));
    }

    // ----- Bind events -----
    optionsBtns.forEach(btn => btn.addEventListener('click', handleOptionClick));
    nextBtn.addEventListener('click', handleNext);

    resetBtn.addEventListener('click', function() {
      resetGame();
      nextBtn.disabled = false;
      nextBtn.textContent = '▶ Next';
      feedback.innerHTML = '🔄 New game! Good luck.';
      optionsBtns.forEach(b => {
        b.disabled = false;
        b.classList.remove('correct', 'wrong');
      });
      updateScoreAndIndex();
    });

    sportFilter.addEventListener('change', resetGame);
    difficultyFilter.addEventListener('change', resetGame);

    // ----- Start -----
    resetGame();
    feedback.innerHTML = '⚡ Select a sport & difficulty, then play!';
  })();
